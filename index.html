<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Mobile viewport: viewport-fit=cover allows content to extend under notch/home indicator.
         CSS env(safe-area-inset-*) is then used to push content out of those zones. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS web app meta -->
    <!-- Allows the app to run in standalone mode (no Safari UI chrome) when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Idynify Scout" />
    <!-- Android / Chrome: tints the browser address bar to match the app brand colour -->
    <meta name="theme-color" content="#ec4899" />
    <!-- Manifest link — see /public/manifest.json (to be created) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta Tags -->
    <title>idynify Scout - Find Your Ideal Clients in Minutes</title>
    <meta name="title" content="idynify Scout - Find Your Ideal Clients in Minutes" />
    <meta name="description" content="It's like Tinder for your ICP. Find and build real relationships with the right people — powered by AI." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://idynify-scout.netlify.app/" />
    <meta property="og:title" content="Find your ideal clients in minutes" />
    <meta property="og:description" content="It's like Tinder for your ICP" />
    <meta property="og:image" content="https://idynify-scout.netlify.app/social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://idynify-scout.netlify.app/" />
    <meta property="twitter:title" content="Find your ideal clients in minutes" />
    <meta property="twitter:description" content="It's like Tinder for your ICP" />
    <meta property="twitter:image" content="https://idynify-scout.netlify.app/social-preview.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
