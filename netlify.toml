[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 requires Node >=20.19.0 or >=22.12.0.
  # Netlify's default Node 20 is pre-20.19, so pin explicitly.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."generate-icp-brief"]
  timeout = 900

[functions."generate-all-reports"]
  timeout = 900

[functions."generate-section-1"]
  timeout = 900

[functions."generate-section-2"]
  timeout = 900

[functions."generate-leads"]
  timeout = 900

[functions."generate-leads-v2"]
  timeout = 900

[functions."daily-leads-refresh"]
  timeout = 900

[functions."process-barry-queue"]
  timeout = 900

[functions."process-scheduled-engagements"]
  timeout = 900

[functions."adminGetUsers"]
  timeout = 26

[dev]
  framework = "#custom"
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  
# Content Security Policy applied to all pages.
# 'unsafe-inline' is required for React's inline styles and Vite's injected
# module-preload polyfill. 'unsafe-eval' is required by Firebase SDK.
# Tighten these once a nonce-based approach is adopted.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https:; worker-src 'self' blob:; frame-src 'self' https:; media-src 'self' https:;"

# index.html must never be cached — ensures browsers always fetch the latest
# build on navigation so the ETag-based version check works correctly.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# manifest.json is also not hashed, so keep it fresh too.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Vite's hashed JS/CSS assets can be cached indefinitely — the hash changes
# with every new build so stale content is never served.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200